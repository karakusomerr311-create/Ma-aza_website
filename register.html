<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./index.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <title>Kayıt Ol</title>
  <script src="./auth.js"></script>
  <script>
    if (window.shopAuth && shopAuth.isLoggedIn()) {
      location.replace("index.html");
    }
  </script>
</head>
<body class="auth-body">
  <header class="header">
    <a href="index.html" class="logo">
      <img src="./images/LOGO FOTO.jpeg" alt="logo" />
    </a>
    <nav class="navbar">
      <a href="login.html">Giriş Yap</a>
    </nav>
    <div class="Butonlar">
      <a href="login.html" class="btn">Giriş Yap</a>
    </div>
  </header>

  <section class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Kayıt Ol</h1>
      <p class="auth-subtitle">
        E-posta ve şifre ile hesap oluşturun; ardından giriş yapabilirsiniz.
      </p>
      <form id="register-form" class="auth-form" novalidate>
        <div class="auth-field">
          <label for="register-email">E-posta</label>
          <input
            type="email"
            id="register-email"
            class="search-input auth-input"
            autocomplete="email"
            required
            placeholder="ornek@mail.com"
          />
        </div>
        <div class="auth-field">
          <label for="register-password">Şifre</label>
          <input
            type="password"
            id="register-password"
            class="search-input auth-input"
            autocomplete="new-password"
            required
            minlength="6"
            placeholder="En az 6 karakter"
          />
        </div>
        <div class="auth-field">
          <label for="register-password2">Şifre (tekrar)</label>
          <input
            type="password"
            id="register-password2"
            class="search-input auth-input"
            autocomplete="new-password"
            required
            minlength="6"
            placeholder="Şifreyi tekrar girin"
          />
        </div>
        <p id="register-error" class="auth-error" role="alert"></p>
        <p id="register-success" class="auth-success" role="status"></p>
        <button type="submit" class="btn auth-submit">Kayıt Ol</button>
      </form>
      <p class="auth-switch">
        Zaten hesabınız var mı?
        <a href="login.html">Giriş yapın</a>
      </p>
    </div>
  </section>

  <script src="./register.js"></script>
</body>
</html>
