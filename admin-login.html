<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./index.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <title>Yönetici Girişi</title>
  <script src="./auth.js"></script>
  <script>
    if (window.shopAuth && shopAuth.isLoggedIn() && shopAuth.isAdmin()) {
      location.replace("admin.html");
    }
  </script>
</head>
<body class="auth-body">
  <header class="header">
    <a href="index.html" class="logo">
      <img src="./images/LOGO FOTO.jpeg" alt="logo" />
    </a>
    <nav class="navbar">
      <a href="login.html">Müşteri girişi</a>
    </nav>
    <div class="Butonlar">
      <a href="index.html" class="btn">Mağazaya dön</a>
    </div>
  </header>

  <section class="auth-page">
    <div class="auth-card auth-card--admin-login">
      <h1 class="auth-title">Yönetici girişi</h1>
      <p class="auth-subtitle">
        Sadece <strong>admin@gmail.com</strong> hesabı ile giriş yapılabilir. Müşteri hesapları bu sayfayı kullanamaz.
      </p>
      <form id="admin-login-form" class="auth-form" novalidate>
        <div class="auth-field">
          <label for="admin-login-email">E-posta</label>
          <input
            type="email"
            id="admin-login-email"
            class="search-input auth-input"
            autocomplete="username"
            required
            placeholder="admin@gmail.com"
          />
        </div>
        <div class="auth-field">
          <label for="admin-login-password">Şifre</label>
          <input
            type="password"
            id="admin-login-password"
            class="search-input auth-input"
            autocomplete="current-password"
            required
            minlength="6"
            placeholder="••••••••"
          />
        </div>
        <p id="admin-login-error" class="auth-error" role="alert"></p>
        <button type="submit" class="btn auth-submit">Yönetici olarak giriş</button>
      </form>
      <p class="auth-switch">
        Müşteri misiniz?
        <a href="login.html">Müşteri girişi</a>
      </p>
    </div>
  </section>

  <script src="./admin-login.js"></script>
</body>
</html>
