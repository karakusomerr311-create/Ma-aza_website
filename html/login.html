<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/index.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <title>Giriş Yap</title>
  <script src="../js/auth.js"></script>
  <script>
    if (window.shopAuth && shopAuth.isLoggedIn()) {
      location.replace(shopAuth.isAdmin() ? "admin.html" : "index.html");
    }
  </script>
</head>
<body class="auth-body">
  <header class="header">
    <a href="index.html" class="logo">
      <img src="../images/LOGO FOTO.jpeg" alt="logo" />
    </a>
    <nav class="navbar">
      <a href="register.html">Kayıt Ol</a>
    </nav>
    <div class="Butonlar">
      <a href="register.html" class="btn">Kayıt Ol</a>
    </div>
  </header>

  <section class="auth-page auth-page--split">
    <div class="auth-split">
      <div class="auth-split__panel">
        <div class="auth-card auth-card--compact">
          <h1 class="auth-title">Müşteri girişi</h1>
          <p class="auth-subtitle">
            Kayıtlı e-posta ve şifrenizle mağaza hesabınıza giriş yapın.
          </p>
          <form id="login-form" class="auth-form" novalidate>
            <div class="auth-field">
              <label for="login-email">E-posta</label>
              <input
                type="email"
                id="login-email"
                class="search-input auth-input"
                autocomplete="email"
                required
                placeholder="ornek@mail.com"
              />
            </div>
            <div class="auth-field">
              <label for="login-password">�?ifre</label>
              <input
                type="password"
                id="login-password"
                class="search-input auth-input"
                autocomplete="current-password"
                required
                minlength="6"
                placeholder="••••••••"
              />
            </div>
            <p id="login-error" class="auth-error" role="alert"></p>
            <button type="submit" class="btn auth-submit">Giriş Yap</button>
          </form>
          <p class="auth-switch">
            Hesabınız yok mu?
            <a href="register.html">Kayıt olun</a>
          </p>
        </div>
      </div>

      <div class="auth-split__divider" aria-hidden="true"></div>

      <div class="auth-split__panel">
        <div class="auth-card auth-card--compact auth-card--admin-teaser">
          <div class="auth-card-icon"><i class="fas fa-user-shield"></i></div>
          <h2 class="auth-title auth-title--small">Yönetici</h2>
          <p class="auth-subtitle">
            Mağaza yönetimi ve sipariş takibi için ayrı giriş kullanılır. Müşteri hesabı ile aynı form kullanılmaz.
          </p>
          <a href="admin-login.html" class="btn auth-submit auth-submit--admin-link">
            Yönetici giriş sayfasına git
          </a>
        </div>
      </div>
    </div>
  </section>

  <script src="../js/login.js"></script>
</body>
</html>
